services:
  database:
    image: postgres:16
    container_name: taskflow_database
    restart: unless-stopped
    environment:
      POSTGRES_USER: task_user
      POSTGRES_PASSWORD: task_password
      POSTGRES_DB: task_manager
    ports:
      - "5432:5432"
    volumes:
      - taskflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_user -d task_manager"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - taskflow_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: taskflow_backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      PORT: 3333
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_USER: task_user
      DATABASE_PASSWORD: task_password
      DATABASE_NAME: task_manager
      JWT_SECRET: taskflow_docker_secret
    command: sh -c "npm run migrate && npm start"
    ports:
      - "3333:3333"
    networks:
      - taskflow_network

  frontend:
    image: node:22-alpine
    container_name: taskflow_frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3333/api
    volumes:
      - ./frontend:/app
      - taskflow_frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    networks:
      - taskflow_network

volumes:
  taskflow_postgres_data:
  taskflow_frontend_node_modules:

networks:
  taskflow_network:
    driver: bridge